# HALO Workflow — Codex 프로젝트 설정 (<repo>/.codex/config.toml)
# 프로젝트 레이어가 신뢰될 때 로드된다. 룰은 루트 AGENTS.md를 Codex가 자동 로드.
# 스킬은 .codex/skills/ 를 Codex가 자동 발견 (halo-workflow·eval·doc-drift + phase 5개). 프롬프트 미사용.

# AGENTS.md가 커질 때를 대비해 프로젝트 문서 한도 상향 (현재 ~4KB):
project_doc_max_bytes = 32768

# 워크플로우는 파일 생성 + 테스트 실행을 한다. 권장(주석 해제해 사용):
# sandbox_mode = "workspace-write"
# approval_policy = "on-request"

# --- 검증 훅 (report-only · 선택) ---------------------------------------
# 편집/패치 후 변경된 src·tests 의 .py 를 lint + matching unit test 로 검증해
# 결과를 developer context 로 surface 한다. 절대 차단하지 않음(report-only).
# ⚠️ Codex 편집 도구명/payload 스키마가 버전마다 달라, 스크립트는 payload 대신
#    git 변경분으로 대상을 찾는다(스키마 비의존). 너무 잦으면 PostToolUse → Stop 으로 바꿔라.
# ⚠️ Windows 면 command 의 python3 → python 으로.
[[hooks.PostToolUse]]
matcher = ".*"

[[hooks.PostToolUse.hooks]]
type = "command"
command = 'python3 "$(git rev-parse --show-toplevel)/.codex/hooks/halo_post_edit.py"'
timeout = 120
statusMessage = "HALO lint/test 검증"
